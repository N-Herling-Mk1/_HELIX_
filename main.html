<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.E.L.I.X — Hub</title>
<link rel="icon" type="image/x-icon" href="assets/img/helix_64.ico">
<meta property="og:title"       content="H.E.L.I.X — Navigation Hub">
<meta property="og:description" content="HEP · Epistemic · Learning · Intelligent AI · Exploration">
<meta property="og:image"       content="https://n-herling-mk1.github.io/_HELIX_/assets/img/Soc_media_tag.png">
<meta property="og:url"         content="https://n-herling-mk1.github.io/_HELIX_/main.html">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:title"      content="H.E.L.I.X — Navigation Hub">
<meta name="twitter:image"      content="https://n-herling-mk1.github.io/_HELIX_/assets/img/Soc_media_tag.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/helix.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<canvas id="bg-canvas" style="position:fixed;top:0;left:0;z-index:1;pointer-events:none;"></canvas>
<div class="grid-bg"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- MINIMAL TOPBAR -->
<header class="topbar">
  <span class="topbar-label">NAVIGATION HUB</span>
  <a href="index.html" class="topbar-back">← RETURN TO SPLASH</a>
</header>

<!-- HUB BODY -->
<div class="hub-body">

  <!-- LEFT NAV RAIL — full height -->
  <nav class="nav-rail">

    <!-- SECTOR IMAGE BOX -->
    <div class="rail-img-box" id="rail-img-box">
      <img id="rail-img" src="assets/img/spiral_flavor.png" alt="" class="loaded" />
    </div>

    <button class="sector-btn" data-sector="H">
      <span class="btn-letter">H</span>
      <span class="btn-word">HEP</span>
      <span class="btn-count"></span>
    </button>

    <button class="sector-btn" data-sector="E">
      <span class="btn-letter">E</span>
      <span class="btn-word">EPISTEMIC</span>
      <span class="btn-count"></span>
    </button>

    <button class="sector-btn" data-sector="L">
      <span class="btn-letter">L</span>
      <span class="btn-word">LEARNING</span>
      <span class="btn-count"></span>
    </button>

    <button class="sector-btn" data-sector="I">
      <span class="btn-letter">I</span>
      <span class="btn-word">INTELLIGENT AI</span>
      <span class="btn-count"></span>
    </button>

    <button class="sector-btn" data-sector="X">
      <span class="btn-letter">X</span>
      <span class="btn-word">EXPLORATION</span>
      <span class="btn-count"></span>
    </button>

    <div class="rail-footer">
      <div class="rail-status">
        <div class="status-dot"></div>
        HELIX ONLINE
      </div>
    </div>

  </nav>

  <!-- CONTENT PANEL -->
  <section class="content-panel">

    <!-- H·E·L·I·X HEADER — 3 columns: logo | buttons centered | sector info -->
    <div class="content-header">

      <div class="content-header-left">
        <div class="content-logo">
          H<span class="dot">·</span>E<span class="dot">·</span>L<span class="dot">·</span>I<span class="dot">·</span>X
        </div>
        <div class="content-status">
          <span class="content-dot"></span>
          <span class="content-online">SYSTEM ONLINE</span>
        </div>
      </div>

      <!-- TAB BUTTONS — always visible, centered -->
      <div class="subtab-bar" id="subtab-bar">
        <button class="subtab" data-tab="articles">ARTICLES</button>
        <button class="subtab" data-tab="notes">NOTES</button>
        <button class="subtab" data-tab="goals">GOALS</button>
      </div>

      <!-- SECTOR INFO — right -->
      <div class="content-sector-info" id="content-sector-info">
        <span class="content-sector-letter" id="content-sector-letter"></span>
        <span class="content-sector-name" id="content-sector-name"></span>
      </div>

    </div>

    <div class="panel-empty" id="panel-empty">
      <div class="empty-glyph">H·E·L·I·X</div>

      <!-- State 1: no tab selected -->
      <div class="empty-msg" id="empty-msg-1">
        SELECT&nbsp;<span class="empty-tab-hint">[ARTICLES]</span>&nbsp;
        <span class="empty-tab-hint">[NOTES]</span>&nbsp;
        <span class="empty-tab-hint">[GOALS]</span>&nbsp;TO GET STARTED
      </div>

      <!-- State 2: tab selected, awaiting sector -->
      <div class="empty-msg hidden" id="empty-msg-2">
        <div class="empty-sector-prompt">SELECT A SECTOR FROM THE LEFT PANEL</div>
        <div class="empty-sector-list">
          <div class="empty-sector-item" data-sector="H"><span class="esl esl-H">H</span> — HEP</div>
          <div class="empty-sector-item" data-sector="E"><span class="esl esl-E">E</span> — EPISTEMIC</div>
          <div class="empty-sector-item" data-sector="L"><span class="esl esl-L">L</span> — LEARNING</div>
          <div class="empty-sector-item" data-sector="I"><span class="esl esl-I">I</span> — INTELLIGENT AI</div>
          <div class="empty-sector-item" data-sector="X"><span class="esl esl-X">X</span> — EXPLORATION</div>
        </div>
      </div>
    </div>

    <!-- CONTENT LIST -->
    <div class="article-list" id="article-list" style="display:none;"></div>

    <!-- PDF VIEWER -->
    <div class="viewer-panel" id="viewer-panel">
      <div class="viewer-topbar">
        <button class="viewer-back" id="viewer-back">← BACK TO LIST</button>
        <span class="viewer-doc-title" id="viewer-doc-title"></span>
        <a class="viewer-dl-btn" id="viewer-dl" href="#" download>↓ DOWNLOAD</a>
      </div>
      <div class="viewer-wrap">
        <iframe class="viewer-frame" id="viewer-frame" src="" title="Document Viewer"></iframe>
        <div class="viewer-grain" id="viewer-grain">
          <div class="viewer-error-msg">
            <div class="viewer-error-code">404</div>
            <div class="viewer-error-label">FILE NOT FOUND</div>
            <div class="viewer-error-sub">PDF has not been uploaded yet</div>
          </div>
        </div>
      </div>
    </div>

  </section>

</div>

<script src="js/articles.js"></script>
<script src="js/main.js"></script>
</body>
</html>
