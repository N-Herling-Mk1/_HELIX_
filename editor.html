<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HELIX — Editor</title>
<link rel="icon" type="image/x-icon" href="assets/img/helix_64.ico">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{
  --bg:#020c14;--bg2:#060f1a;--bg3:#0d1a26;
  --border:#0d2235;--border2:#1a3a55;--dim:#1e4060;
  --text:#c8dce8;--text2:#4a6880;
  --cyan:#00e5ff;--ok:#00ff41;--err:#ff2255;--warn:#ff6a00;--purple:#b044ff;
  --H:#00e5ff;--E:#b044ff;--L:#00ff41;--I:#ff6a00;--X:#ff2255;
  --sector-c:var(--cyan);
  --term-h:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;}
input,textarea,select{
  font-family:'Share Tech Mono',monospace;background:var(--bg3);
  border:1px solid var(--border2);color:var(--text);padding:8px 10px;font-size:12px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%;resize:vertical;
}
input:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,.12);}
textarea{min-height:80px;}
select option{background:var(--bg2);}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* TOPBAR */
.topbar{height:46px;background:rgba(2,12,20,.98);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:20;}
.tbar-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:13px;
  letter-spacing:5px;color:var(--cyan);text-shadow:0 0 14px rgba(0,229,255,.4);}
.tbar-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0;}
.tbar-badge{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:3px;padding:3px 10px;border:1px solid var(--sector-c);
  color:var(--sector-c);transition:all .25s;white-space:nowrap;}
.tbar-tabs{display:flex;gap:3px;}
.tbar-tab{font-size:9px;letter-spacing:3px;color:var(--text2);padding:4px 12px;
  border:1px solid transparent;cursor:pointer;transition:all .2s;background:transparent;}
.tbar-tab.active{color:var(--cyan);border-color:rgba(0,229,255,.35);background:rgba(0,229,255,.06);}
.tbar-tab:hover:not(.active){color:var(--text);border-color:var(--border2);}
.tbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.save-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--ok);border:1px solid rgba(0,255,65,.4);background:rgba(0,255,65,.05);
  padding:5px 18px;cursor:pointer;transition:all .2s;}
.save-btn:hover{background:rgba(0,255,65,.14);border-color:var(--ok);box-shadow:0 0 12px rgba(0,255,65,.2);}
.save-btn:disabled{color:var(--dim);border-color:var(--dim);background:transparent;cursor:default;}
.status-pill{font-size:9px;letter-spacing:2px;padding:3px 8px;border:1px solid transparent;transition:all .4s;}
.status-pill.saving{color:var(--warn);border-color:rgba(255,106,0,.4);}
.status-pill.saved{color:var(--ok);border-color:rgba(0,255,65,.4);}
.status-pill.err{color:var(--err);border-color:rgba(255,34,85,.4);}

/* LAYOUT */
.workspace{display:flex;flex:1;overflow:hidden;flex-direction:column;}
.editor-row{display:flex;flex:1;overflow:hidden;}

/* SECTOR RAIL */
.sector-rail{width:52px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;}
.s-btn{width:40px;height:40px;background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-family:'Orbitron',monospace;font-weight:900;font-size:13px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.s-btn:hover{border-color:var(--dim);color:var(--text);}
.s-btn.active{border-color:var(--sector-c);color:var(--sector-c);background:rgba(0,0,0,.4);
  box-shadow:0 0 10px var(--sector-c) inset,0 0 6px var(--sector-c);}

/* LIST */
.list-panel{width:280px;display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0;}
.list-header{padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.list-title{font-size:9px;letter-spacing:4px;color:var(--text2);}
.new-btn{font-size:9px;letter-spacing:2px;color:var(--sector-c);
  border:1px solid rgba(0,229,255,.3);background:transparent;padding:3px 10px;
  cursor:pointer;transition:all .2s;}
.new-btn:hover{background:rgba(0,229,255,.08);border-color:var(--sector-c);}
.list-scroll{flex:1;overflow-y:auto;padding:7px;}
.item-card{padding:9px 11px;border:1px solid var(--border2);margin-bottom:5px;
  cursor:pointer;transition:all .15s;position:relative;background:var(--bg2);}
.item-card:hover{border-color:var(--sector-c);background:var(--bg3);}
.item-card.selected{border-color:var(--sector-c);background:var(--bg3);}
.item-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--sector-c);box-shadow:0 0 5px var(--sector-c);}
.card-title{font-size:11px;color:var(--text);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:9px;color:var(--text2);letter-spacing:.5px;}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.card-tag{font-size:8px;letter-spacing:1px;padding:1px 5px;
  border:1px solid rgba(0,229,255,.2);color:rgba(0,229,255,.5);}
.card-del{position:absolute;top:5px;right:5px;width:16px;height:16px;
  background:transparent;border:1px solid rgba(255,34,85,.3);color:rgba(255,34,85,.5);
  font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .15s;}
.card-del:hover{background:rgba(255,34,85,.15);color:var(--err);border-color:var(--err);}
.item-card:hover .card-del{display:flex;}
.empty-list{padding:24px 12px;text-align:center;color:var(--text2);font-size:9px;letter-spacing:2px;line-height:2.2;}

/* EDIT */
.edit-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.edit-scroll{flex:1;overflow-y:auto;padding:18px 22px;}
.edit-empty{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--text2);gap:10px;}
.edit-empty-glyph{font-family:'Orbitron',monospace;font-size:24px;letter-spacing:6px;color:var(--border2);}
.edit-empty-msg{font-size:9px;letter-spacing:3px;}
.edit-footer{padding:10px 22px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.field-group{margin-bottom:14px;}
.field-label{font-size:9px;letter-spacing:3px;color:var(--text2);margin-bottom:5px;display:block;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.status-sel{display:flex;gap:5px;flex-wrap:wrap;}
.status-opt{font-size:9px;letter-spacing:2px;padding:4px 10px;border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;transition:all .15s;background:transparent;}
.status-opt:hover{border-color:var(--dim);color:var(--text);}
.status-opt.active-draft{border-color:var(--warn);color:var(--warn);background:rgba(255,106,0,.08);}
.status-opt.active-published{border-color:var(--ok);color:var(--ok);background:rgba(0,255,65,.08);}
.status-opt.active-todo{border-color:var(--text2);color:var(--text2);background:rgba(200,220,232,.05);}
.status-opt.active-in-progress{border-color:var(--warn);color:var(--warn);background:rgba(255,106,0,.08);}
.status-opt.active-done{border-color:var(--ok);color:var(--ok);background:rgba(0,255,65,.08);}
.tag-editor{min-height:38px;border:1px solid var(--border2);padding:5px 7px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:text;
  transition:border-color .2s;background:var(--bg3);}
.tag-editor:focus-within{border-color:var(--cyan);box-shadow:0 0 7px rgba(0,229,255,.1);}
.tag-chip{display:flex;align-items:center;gap:4px;padding:2px 7px;
  border:1px solid var(--sector-c);color:var(--sector-c);
  background:rgba(0,229,255,.05);font-size:9px;letter-spacing:1.5px;white-space:nowrap;}
.tag-chip-x{background:transparent;border:none;color:inherit;cursor:pointer;
  font-size:11px;line-height:1;padding:0;opacity:.5;transition:opacity .15s;}
.tag-chip-x:hover{opacity:1;}
.tag-input{border:none;background:transparent;color:var(--text);font-size:10px;
  letter-spacing:1px;outline:none;min-width:70px;padding:2px 3px;flex:1;
  font-family:'Share Tech Mono',monospace;}
.file-drop{border:1px dashed var(--border2);padding:14px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative;}
.file-drop:hover,.file-drop.dragover{border-color:var(--cyan);background:rgba(0,229,255,.03);}
.file-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.file-drop-text{font-size:10px;letter-spacing:1px;color:var(--text2);}
.file-drop-text span{color:var(--cyan);}
.file-current{margin-top:6px;padding:7px 10px;border:1px solid var(--border2);
  background:var(--bg2);display:flex;align-items:center;justify-content:space-between;}
.file-name{font-size:10px;color:var(--ok);letter-spacing:.5px;}
.file-clear{font-size:9px;color:rgba(255,34,85,.6);cursor:pointer;background:none;
  border:none;letter-spacing:1px;transition:color .15s;}
.file-clear:hover{color:var(--err);}
.action-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  padding:7px 18px;cursor:pointer;transition:all .2s;border:1px solid;background:transparent;}
.action-btn.primary{color:var(--ok);border-color:rgba(0,255,65,.4);}
.action-btn.primary:hover{background:rgba(0,255,65,.1);border-color:var(--ok);}
.action-btn.danger{color:var(--err);border-color:rgba(255,34,85,.3);}
.action-btn.danger:hover{background:rgba(255,34,85,.1);border-color:var(--err);}

/* TERMINAL */
.term-panel{height:var(--term-h);background:#0a0400;border-top:2px solid #cc4400;
  display:flex;flex-direction:column;flex-shrink:0;transition:height .25s ease;}
.term-panel.collapsed{height:32px;}
.term-topbar{height:32px;display:flex;align-items:center;padding:0 12px;gap:10px;
  border-bottom:1px solid #331a00;background:rgba(10,4,0,.8);flex-shrink:0;cursor:pointer;}
.term-topbar:hover{background:rgba(255,106,0,.05);}
.term-title{font-size:9px;letter-spacing:4px;color:#cc6600;}
.term-dot{width:8px;height:8px;border-radius:50%;background:var(--err);
  box-shadow:0 0 6px var(--err);flex-shrink:0;}
.term-dot.on{background:#ff6a00;box-shadow:0 0 8px #ff6a00;}
.term-cwd{font-size:9px;letter-spacing:1px;color:#885500;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:300px;}
.term-actions{margin-left:auto;display:flex;gap:6px;}
.term-btn{font-size:9px;letter-spacing:1px;padding:2px 8px;
  border:1px solid #331a00;color:#cc6600;background:transparent;cursor:pointer;transition:all .15s;}
.term-btn:hover{border-color:#ff6a00;color:#ff6a00;}
.term-wrap{flex:1;padding:4px 6px;overflow:hidden;}
#xterm-container{width:100%;height:100%;}
.xterm{height:100%!important;}
.xterm-viewport{background:transparent!important;}
.xterm-screen canvas{image-rendering:pixelated;}

/* quick cmds */
.quick-cmds{display:flex;gap:5px;padding:5px 12px 0;flex-wrap:wrap;flex-shrink:0;}
.qcmd{font-size:9px;letter-spacing:1px;padding:2px 10px;
  border:1px solid #331a00;color:#ff6a00;background:rgba(255,106,0,.05);
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.qcmd:hover{border-color:#ff6a00;background:rgba(255,106,0,.12);
  box-shadow:0 0 8px rgba(255,106,0,.2);}

.scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}
</style>
</head>
<body>
<div class="scanlines"></div>

<header class="topbar">
  <span class="tbar-logo">H·E·L·I·X</span>
  <div class="tbar-sep"></div>
  <span class="tbar-badge" id="sector-badge">H — HEP</span>
  <div class="tbar-sep"></div>
  <div class="tbar-tabs">
    <button class="tbar-tab active" onclick="setTab('articles')">ARTICLES</button>
    <button class="tbar-tab" onclick="setTab('notes')">NOTES</button>
    <button class="tbar-tab" onclick="setTab('goals')">GOALS</button>
  </div>
  <div class="tbar-right">
    <span class="status-pill" id="status-pill"></span>
    <button class="save-btn" id="save-btn" onclick="saveAll()" disabled>SAVE ALL</button>
  </div>
</header>

<div class="workspace">
  <div class="editor-row">

    <nav class="sector-rail">
      <button class="s-btn active" style="--sector-c:var(--H)" onclick="setSector('H')">H</button>
      <button class="s-btn" style="--sector-c:var(--E)" onclick="setSector('E')">E</button>
      <button class="s-btn" style="--sector-c:var(--L)" onclick="setSector('L')">L</button>
      <button class="s-btn" style="--sector-c:var(--I)" onclick="setSector('I')">I</button>
      <button class="s-btn" style="--sector-c:var(--X)" onclick="setSector('X')">X</button>
    </nav>

    <div class="list-panel">
      <div class="list-header">
        <span class="list-title" id="list-title">ARTICLES</span>
        <button class="new-btn" onclick="newItem()">+ NEW</button>
      </div>
      <div class="list-scroll" id="list-scroll">
        <div class="empty-list">LOADING...</div>
      </div>
    </div>

    <div class="edit-panel" id="edit-panel">
      <div class="edit-empty" id="edit-empty">
        <div class="edit-empty-glyph">H·E·L·I·X</div>
        <div class="edit-empty-msg">SELECT AN ITEM OR CREATE A NEW ONE</div>
      </div>
      <div id="edit-form" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="edit-scroll" id="edit-scroll"></div>
        <div class="edit-footer">
          <button class="action-btn primary" onclick="applyItem()">APPLY</button>
          <button class="action-btn danger" onclick="deleteItem()">DELETE</button>
          <span style="margin-left:auto;font-size:9px;color:var(--text2)" id="item-id-lbl"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- TERMINAL -->
  <div class="term-panel" id="term-panel">
    <div class="term-topbar" onclick="toggleTerm()">
      <div class="term-dot" id="term-dot"></div>
      <span class="term-title">TERMINAL</span>
      <span class="term-cwd" id="term-cwd"></span>
      <div class="term-actions" onclick="event.stopPropagation()">
        <button class="term-btn" onclick="termClear()">CLR</button>
        <button class="term-btn" onclick="termReconnect()">↺</button>
        <button class="term-btn" id="term-toggle-btn" onclick="toggleTerm()">▼</button>
      </div>
    </div>
    <div class="quick-cmds" id="quick-cmds">
      <button class="qcmd" onclick="termSend('cd /d %~dp0')">cd repo</button>
      <button class="qcmd" onclick="termSend('git status')">git status</button>
      <button class="qcmd" onclick="termSend('git add . && git commit -m \\"update\\" && git push')">git push</button>
      <button class="qcmd" onclick="termSend('python helix_server.py')">start server</button>
      <button class="qcmd" onclick="termSend('dir')">dir</button>
      <button class="qcmd" onclick="termSend('cls')">cls</button>
    </div>
    <div class="term-wrap" id="term-wrap">
      <div id="xterm-container"></div>
    </div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SC = {H:'#00e5ff',E:'#b044ff',L:'#00ff41',I:'#ff6a00',X:'#ff2255'};
const SN = {H:'HEP',E:'EPISTEMIC',L:'LEARNING',I:'INTELLIGENT AI',X:'EXPLORATION'};
let DB={}, sector='H', tab='articles', selId=null, dirty=false;
let currentTags=[], pendingFile=null;

async function init() {
  for (const s of 'HELIX') DB[s]={articles:[],notes:[],goals:[]};
  try {
    const r=await fetch('/api/data');
    if(r.ok){const d=await r.json();if(d.data)DB=d.data;}
  } catch(e){pill('API OFFLINE','err');}
  setSector('H');
}

function setSector(s) {
  sector=s; selId=null;
  const col=SC[s];
  document.documentElement.style.setProperty('--sector-c',col);
  document.getElementById('sector-badge').textContent=s+' — '+SN[s];
  document.getElementById('sector-badge').style.borderColor=col;
  document.getElementById('sector-badge').style.color=col;
  document.querySelectorAll('.s-btn').forEach((b,i)=>
    b.classList.toggle('active','HELIX'[i]===s));
  renderAll();
}

function setTab(t) {
  tab=t; selId=null;
  document.querySelectorAll('.tbar-tab').forEach(b=>
    b.classList.toggle('active',b.textContent.toLowerCase()===t));
  document.getElementById('list-title').textContent=t.toUpperCase();
  renderAll();
}

function renderAll(){renderList();showEmpty();}

function renderList() {
  const items=DB[sector][tab]||[];
  const el=document.getElementById('list-scroll');
  if(!items.length){el.innerHTML='<div class="empty-list">NO ITEMS YET<br>CLICK + NEW</div>';return;}
  el.innerHTML=items.map(item=>{
    const tags=(item.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('');
    const meta=tab==='articles'?[item.authors,item.year].filter(Boolean).join(' · ')
              :tab==='goals'?(item.status||'').toUpperCase():item.date||'';
    return `<div class="item-card${selId===item.id?' selected':''}" onclick="selectItem('${item.id}')">
      <div class="card-title">${esc(item.title||'Untitled')}</div>
      ${meta?`<div class="card-meta">${esc(meta)}</div>`:''}
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      <button class="card-del" onclick="event.stopPropagation();delById('${item.id}')">✕</button>
    </div>`;
  }).join('');
}

function showEmpty(){
  document.getElementById('edit-empty').style.display='flex';
  document.getElementById('edit-form').style.display='none';
}

function selectItem(id) {
  selId=id; renderList();
  const item=(DB[sector][tab]||[]).find(i=>i.id===id);
  if(!item) return;
  document.getElementById('edit-empty').style.display='none';
  const ef=document.getElementById('edit-form'); ef.style.display='flex';
  document.getElementById('item-id-lbl').textContent='ID: '+id;
  let html=tab==='articles'?formArticle(item):tab==='notes'?formNote(item):formGoal(item);
  document.getElementById('edit-scroll').innerHTML=html;
  initTags(item.tags||[]);
  if(tab==='articles') initFileDrop(item);
}

function formArticle(item){return `
  <div class="field-group"><label class="field-label">TITLE</label>
    <input id="f-title" value="${esc(item.title||'')}"></div>
  <div class="field-group field-row">
    <div><label class="field-label">AUTHORS</label>
      <input id="f-authors" value="${esc(item.authors||'')}"></div>
    <div><label class="field-label">YEAR</label>
      <input id="f-year" value="${esc(item.year||'')}"></div>
  </div>
  <div class="field-group"><label class="field-label">ABSTRACT</label>
    <textarea id="f-abstract" rows="4">${esc(item.abstract||'')}</textarea></div>
  <div class="field-group"><label class="field-label">PDF FILE</label>
    <div id="file-field"></div></div>
  <div class="field-group"><label class="field-label">STATUS</label>
    <div class="status-sel">
      <button class="status-opt${item.status==='draft'?' active-draft':''}" onclick="setOpt(this,'draft')">DRAFT</button>
      <button class="status-opt${item.status==='published'?' active-published':''}" onclick="setOpt(this,'published')">PUBLISHED</button>
    </div></div>
  <div class="field-group"><label class="field-label">TAGS</label>
    <div class="tag-editor" id="tag-editor" onclick="focusTag()"></div></div>`;}

function formNote(item){return `
  <div class="field-group"><label class="field-label">TITLE</label>
    <input id="f-title" value="${esc(item.title||'')}"></div>
  <div class="field-group"><label class="field-label">CONTENT</label>
    <textarea id="f-content" rows="10">${esc(item.content||'')}</textarea></div>
  <div class="field-group"><label class="field-label">TAGS</label>
    <div class="tag-editor" id="tag-editor" onclick="focusTag()"></div></div>`;}

function formGoal(item){return `
  <div class="field-group"><label class="field-label">TITLE</label>
    <input id="f-title" value="${esc(item.title||'')}"></div>
  <div class="field-group"><label class="field-label">DESCRIPTION</label>
    <textarea id="f-desc" rows="5">${esc(item.description||'')}</textarea></div>
  <div class="field-group"><label class="field-label">STATUS</label>
    <div class="status-sel">
      <button class="status-opt${item.status==='todo'?' active-todo':''}" onclick="setOpt(this,'todo')">TODO</button>
      <button class="status-opt${item.status==='in-progress'?' active-in-progress':''}" onclick="setOpt(this,'in-progress')">IN PROGRESS</button>
      <button class="status-opt${item.status==='done'?' active-done':''}" onclick="setOpt(this,'done')">DONE</button>
    </div></div>
  <div class="field-group"><label class="field-label">TAGS</label>
    <div class="tag-editor" id="tag-editor" onclick="focusTag()"></div></div>`;}

// TAGS
function initTags(tags){currentTags=[...tags];renderTags();}
function renderTags(){
  const ed=document.getElementById('tag-editor');if(!ed)return;
  ed.innerHTML=currentTags.map((t,i)=>
    `<span class="tag-chip">${esc(t)}<button class="tag-chip-x" onclick="rmTag(${i})">×</button></span>`
  ).join('')+`<input class="tag-input" id="tag-input" placeholder="add tag..."
    onkeydown="tagKey(event)" onblur="commitTag()">`;
}
function focusTag(){const i=document.getElementById('tag-input');if(i)i.focus();}
function tagKey(e){
  if(['Enter',',',' '].includes(e.key)){e.preventDefault();commitTag();}
  else if(e.key==='Backspace'&&e.target.value===''&&currentTags.length){currentTags.pop();renderTags();focusTag();}
}
function commitTag(){
  const i=document.getElementById('tag-input');if(!i)return;
  const v=i.value.trim().toUpperCase().replace(/,/g,'');
  if(v&&!currentTags.includes(v)){currentTags.push(v);renderTags();focusTag();}
  else if(i)i.value='';
}
function rmTag(i){currentTags.splice(i,1);renderTags();}

// FILE DROP
function initFileDrop(item){
  pendingFile=null;
  const ff=document.getElementById('file-field');if(!ff)return;
  const ex=item.file||'';
  ff.innerHTML=`<div class="file-drop" id="fdrop">
    <input type="file" accept=".pdf" onchange="filePick(event)">
    <div class="file-drop-text">DROP PDF OR <span>CLICK TO BROWSE</span></div>
  </div>
  ${ex?`<div class="file-current"><span class="file-name">📄 ${esc(ex.split('/').pop())}</span>
    <button class="file-clear" onclick="fileClear()">✕</button></div>`:''}
  <div id="fpend" style="display:none" class="file-current">
    <span class="file-name" id="fpend-name" style="color:var(--warn)"></span>
    <span style="font-size:9px;color:var(--text2)">PENDING</span></div>`;
  const d=document.getElementById('fdrop');
  d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('dragover');});
  d.addEventListener('dragleave',()=>d.classList.remove('dragover'));
  d.addEventListener('drop',e=>{e.preventDefault();d.classList.remove('dragover');
    const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.pdf'))setPending(f);});
}
function filePick(e){const f=e.target.files[0];if(f)setPending(f);}
function setPending(f){
  pendingFile=f;
  const p=document.getElementById('fpend');
  if(p){p.style.display='flex';document.getElementById('fpend-name').textContent='📄 '+f.name;}
}
function fileClear(){
  pendingFile=null;
  const item=(DB[sector][tab]||[]).find(i=>i.id===selId);
  if(item){item.file='';markDirty();}initFileDrop(item||{});
}
function setOpt(btn,val){
  btn.closest('.status-sel').querySelectorAll('.status-opt').forEach(b=>b.className='status-opt');
  btn.classList.add('active-'+val);
}
function getOptVal(){
  const a=document.querySelector('.status-opt[class*="active-"]');if(!a)return'draft';
  return([...a.classList].find(c=>c.startsWith('active-'))||'active-draft').replace('active-','');
}
function newItem(){
  const id=sector.toLowerCase()+'-'+tab[0]+'-'+Date.now().toString(36);
  let item={id,title:'',tags:[]};
  if(tab==='articles')Object.assign(item,{authors:'',year:'',abstract:'',file:'',status:'draft'});
  else if(tab==='notes')Object.assign(item,{content:'',date:new Date().toISOString().slice(0,10)});
  else Object.assign(item,{description:'',status:'todo'});
  DB[sector][tab].push(item);selId=id;markDirty();renderList();selectItem(id);
}
function deleteItem(){if(selId)delById(selId);}
function delById(id){
  if(!confirm('Delete?'))return;
  DB[sector][tab]=DB[sector][tab].filter(i=>i.id!==id);
  if(selId===id){selId=null;showEmpty();}markDirty();renderList();
}
function applyItem(){
  if(!selId)return;commitTag();
  const item=(DB[sector][tab]||[]).find(i=>i.id===selId);if(!item)return;
  item.title=v('f-title');item.tags=[...currentTags];
  if(tab==='articles'){item.authors=v('f-authors');item.year=v('f-year');
    item.abstract=v('f-abstract');item.status=getOptVal();}
  else if(tab==='notes'){item.content=v('f-content');}
  else{item.description=v('f-desc');item.status=getOptVal();}
  markDirty();renderList();pill('APPLIED','saved');
}
async function saveAll(){
  pill('SAVING...','saving');
  if(pendingFile&&selId){
    const fd=new FormData();fd.append('file',pendingFile);fd.append('sector',sector.toLowerCase());
    try{
      const r=await fetch('/api/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(d.path){const item=(DB[sector][tab]||[]).find(i=>i.id===selId);if(item)item.file=d.path;}
      pendingFile=null;
    }catch(e){pill('UPLOAD FAILED','err');return;}
  }
  try{
    const r=await fetch('/api/data',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({data:DB})});
    if(r.ok){dirty=false;document.getElementById('save-btn').disabled=true;
      pill('SAVED ✓','saved');setTimeout(()=>pill('',''),3000);}
    else pill('FAILED','err');
  }catch(e){pill('OFFLINE','err');}
}
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function markDirty(){dirty=true;document.getElementById('save-btn').disabled=false;}
function pill(msg,cls){
  const p=document.getElementById('status-pill');
  p.textContent=msg;p.className='status-pill'+(cls?' '+cls:'');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});

// ── TERMINAL ──────────────────────────────────────────────────────────────────
let term, fitAddon, socket, termCollapsed=false;

const TERM_THEME = {
  background:     '#0a0400',
  foreground:     '#ffd700',
  cursor:         '#ff6a00',
  cursorAccent:   '#0a0400',
  selectionBackground: 'rgba(255,106,0,0.3)',
  black:          '#0a0400',
  red:            '#ff2255',
  green:          '#ff6a00',
  yellow:         '#ffd700',
  blue:           '#cc4400',
  magenta:        '#ff4400',
  cyan:           '#ffaa00',
  white:          '#ffe066',
  brightBlack:    '#3a1800',
  brightRed:      '#ff4477',
  brightGreen:    '#ffaa44',
  brightYellow:   '#ffe566',
  brightBlue:     '#ff7733',
  brightMagenta:  '#ff6644',
  brightCyan:     '#ffcc66',
  brightWhite:    '#ffffff',
};

const BANNER = [
  '',
  '\x1b[33m\x1b[1m  ██╗  ██╗███████╗██╗     ██╗██╗  ██╗\x1b[0m',
  '\x1b[33m\x1b[1m  ██║  ██║██╔════╝██║     ██║╚██╗██╔╝\x1b[0m',
  '\x1b[31m\x1b[1m  ███████║█████╗  ██║     ██║ ╚███╔╝ \x1b[0m',
  '\x1b[31m\x1b[1m  ██╔══██║██╔══╝  ██║     ██║ ██╔██╗ \x1b[0m',
  '\x1b[33m\x1b[1m  ██║  ██║███████╗███████╗██║██╔╝ ██╗\x1b[0m',
  '\x1b[33m\x1b[1m  ╚═╝  ╚═╝╚══════╝╚══════╝╚═╝╚═╝  ╚═╝\x1b[0m',
  '',
  '\x1b[2m\x1b[33m  HEP · Epistemic · Learning · Intelligent AI · eXploration\x1b[0m',
  '',
  '\x1b[32m  ● TERMINAL READY\x1b[0m\x1b[2m  —  type commands below\x1b[0m',
  '\x1b[2m  ─────────────────────────────────────────────────────────\x1b[0m',
  '',
];

function initTerminal() {
  try {
    term = new Terminal({
      theme: TERM_THEME,
      fontFamily: "'Share Tech Mono', 'Courier New', monospace",
      fontSize: 13,
      lineHeight: 1.45,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 2000,
      convertEol: true,
      allowTransparency: true,
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('xterm-container'));
    fitAddon.fit();
    window.addEventListener('resize', ()=>{try{fitAddon.fit();}catch(e){}});
    connectSocket();
    // forward all keystrokes directly to shell
    term.onData(data => {
      if(socket && socket.connected) socket.emit('term_input',{data});
    });
    term.onResize(({cols,rows}) => {
      if(socket && socket.connected) socket.emit('term_resize',{cols,rows});
    });
  } catch(e) {
    console.error('Terminal init failed:',e);
    document.getElementById('term-wrap').innerHTML=
      `<div style="padding:12px;font-size:10px;color:#ff2255">Terminal init failed: ${e}</div>`;
  }
}

function connectSocket() {
  try {
    socket = io({transports:['websocket','polling']});
    socket.on('connect', ()=>{
      document.getElementById('term-dot').className='term-dot on';
      // show banner
      if(term) BANNER.forEach(l=>term.writeln(l));
    });
    socket.on('disconnect', ()=>{
      document.getElementById('term-dot').className='term-dot';
      document.getElementById('term-cwd').textContent='';
      if(term) term.writeln('\r\n\x1b[31m[disconnected — click ↺ to reconnect]\x1b[0m');
    });
    socket.on('term_output', data=>{
      if(term) term.write(data.data);
      // try to extract cwd from prompt pattern [C:\path]>
      const m = data.data.match(/\[([^\]]+)\]>/);
      if(m) document.getElementById('term-cwd').textContent = m[1];
    });
    socket.on('connect_error', e=>{
      if(term) term.writeln(`\r\n\x1b[31m[connection error: ${e.message}]\x1b[0m`);
    });
  } catch(e){ console.error('Socket init:',e); }
}

function termSend(cmd) {
  if(socket && socket.connected){
    socket.emit('term_input',{data: cmd+'\r\n'});
    // expand terminal if collapsed
    if(termCollapsed) toggleTerm();
  }
}
function termClear(){if(term)term.clear();}
function termReconnect(){if(socket)socket.disconnect();setTimeout(connectSocket,300);}
function toggleTerm(){
  termCollapsed=!termCollapsed;
  const panel=document.getElementById('term-panel');
  const btn=document.getElementById('term-toggle-btn');
  panel.classList.toggle('collapsed',termCollapsed);
  btn.textContent=termCollapsed?'▲':'▼';
  if(!termCollapsed&&fitAddon) setTimeout(()=>fitAddon.fit(),280);
}

init();
window.addEventListener('load',()=>setTimeout(initTerminal,300));
</script>
</body>
</html>
